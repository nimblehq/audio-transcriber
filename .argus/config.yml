# Argus Configuration
# Docs: https://github.com/nimblehq/argus/blob/main/docs/framework.md#configuration

# PM Tool
pm_tool: github_projects
commit_prefix: gh
github_project_number: 92
# github_repo: owner/repo  # Optional — auto-detected from git remote origin


# Stack & Conventions
stacks:
  - python
# conventions_source: https://nimblehq.co/compass/development/code-conventions/

# Quality
test_coverage: 80

# Workflow Mode
mode: interactive              # interactive | autonomous
depth: standard                # quick | standard | comprehensive

# Model Profile (LLM-agnostic tiers)
model_profile: balanced        # quality | balanced | budget

# Agent Toggles
workflow:
  product_research: true
  technical_research: true
  qa_agent: true
  architect_agent: true

# Parallelization
parallelization:
  enabled: true
  max_concurrent_agents: 3

# Human Confirmation Gates
gates:
  confirm_specs: true
  confirm_stories: true
  confirm_plan: true
  confirm_pr: true

# Safety
safety:
  always_confirm_destructive: true
  always_confirm_external_services: true
